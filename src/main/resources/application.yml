server:
  port: 8080

spring:
  application:
    name: worknest-service

  datasource:
    url: jdbc:mysql://localhost:3306/platform_master?createDatabaseIfNotExist=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      indent-output: true
    default-property-inclusion: non_null

  output:
    ansi:
      enabled: ALWAYS

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.security: INFO
    com.worknest: DEBUG
    com.worknest.tenant.filter: DEBUG
    com.worknest.tenant.resolver: DEBUG
    com.worknest.tenant.connection: DEBUG

app:
  tenant:
    header: X-Tenant-ID
    default: master
  jwt:
    # Base64-encoded key for development only. Replace in production.
    secret: V29ya05lc3RTdXBlclNlY3JldEtleUZvckpXVDEyMzQ1Njc4OTAxMjM0NTY3ODkw
    access-token-expiration-minutes: 30
    refresh-token-expiration-days: 7
  bootstrap:
    platform-admin:
      name: Platform Admin
      email: platform.admin@worknest.local
      password: ChangeMe123!
