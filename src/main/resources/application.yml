server:
  port: 8080

spring:
  application:
    name: worknest-service

  jmx:
    enabled: false

  datasource:
    url: jdbc:mysql://localhost:3306/platform_master?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  mail:
    host: smtp.gmail.com
    port: 587
    username: nipunsathsara1999@gmail.com
    password: ljwd rzec csus prje
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      indent-output: true
    default-property-inclusion: non_null

  output:
    ansi:
      enabled: ALWAYS
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

logging:
  pattern:
    level: "%5p [tenant:%X{tenantId:-na}]"
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql: INFO
    org.springframework.security: INFO
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO
    com.worknest: DEBUG
    com.worknest.tenant.filter: INFO
    com.worknest.tenant.resolver: INFO
    com.worknest.tenant.connection: INFO

app:
  master:
    datasource:
      pool:
        maximum-pool-size: 15
        minimum-idle: 2
        connection-timeout-ms: 30000
        idle-timeout-ms: 300000
        max-lifetime-ms: 1800000
        validation-timeout-ms: 5000
        leak-detection-threshold-ms: 0
  tenant:
    header: X-Tenant-ID
    default: master
    jpa:
      hibernate:
        ddl-auto: update
    datasource:
      cache:
        max-cached-pools: 100
        idle-eviction-ms: 900000
        eviction-interval-ms: 60000
      pool:
        maximum-pool-size: 8
        minimum-idle: 0
        connection-timeout-ms: 30000
        idle-timeout-ms: 300000
        max-lifetime-ms: 1800000
        validation-timeout-ms: 5000
        leak-detection-threshold-ms: 0
  jwt:
    secret: V29ya05lc3RTdXBlclNlY3JldEtleUZvckpXVDEyMzQ1Njc4OTAxMjM0NTY3ODkw
    expiration: 900000
    refresh-expiration: 604800000
    refresh-rotation-grace-ms: 45000
  onboarding:
    provisioning:
      executor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  websocket:
    allowed-origins: http://localhost:3000,http://localhost:5173
  storage:
    # Temporary dev-only storage path: write uploaded files into frontend public/uploads.
    frontend-public-uploads-dir: ../WorkNest-Client-ReactJs/public/uploads
    max-file-size-bytes: 10485760
    allowed-mime-types: image/png,image/jpeg,application/pdf,text/plain
  email:
    from: nipunsathsara1999@gmail.com
    executor:
      core-pool-size: 2
      max-pool-size: 10
      queue-capacity: 500
      keep-alive-seconds: 60
  auth:
    password-reset:
      token-expiry-minutes: 20
      link-base-url: http://localhost:5173/reset-password
  reminders:
    cron: "0 0 */6 * * *"
    timezone: UTC
    leave:
      days-before-start: 1,2
    task:
      days-before-due: 1,2,3

bootstrap:
  platform-admin:
    name: Platform Admin
    email: platform.admin@worknest.local
    password: ChangeMe123!
  seed-demo-data: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method