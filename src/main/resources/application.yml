server:
  port: 8080

spring:
  application:
    name: worknest-service

  datasource:
    url: jdbc:mysql://localhost:3306/platform_master?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: false

  jackson:
    serialization:
      indent-output: true
    default-property-inclusion: non_null

  output:
    ansi:
      enabled: ALWAYS
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

logging:
  pattern:
    level: "%5p [tenant:%X{tenantId:-na}]"
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql: INFO
    org.springframework.security: INFO
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO
    com.worknest: DEBUG
    com.worknest.tenant.filter: INFO
    com.worknest.tenant.resolver: INFO
    com.worknest.tenant.connection: INFO

app:
  master:
    datasource:
      pool:
        maximum-pool-size: 15
        minimum-idle: 2
        connection-timeout-ms: 30000
        idle-timeout-ms: 300000
        max-lifetime-ms: 1800000
        validation-timeout-ms: 5000
        leak-detection-threshold-ms: 0
  tenant:
    header: X-Tenant-ID
    default: master
    jpa:
      hibernate:
        ddl-auto: none
    datasource:
      cache:
        max-cached-pools: 100
        idle-eviction-ms: 900000
        eviction-interval-ms: 60000
      pool:
        maximum-pool-size: 8
        minimum-idle: 0
        connection-timeout-ms: 30000
        idle-timeout-ms: 300000
        max-lifetime-ms: 1800000
        validation-timeout-ms: 5000
        leak-detection-threshold-ms: 0
    migration:
      locations: classpath:db/migration/tenant
      baseline-on-migrate: true
      validate-on-migrate: true
  jwt:
    secret: V29ya05lc3RTdXBlclNlY3JldEtleUZvckpXVDEyMzQ1Njc4OTAxMjM0NTY3ODkw
    access-token-expiration-minutes: 30
    refresh-token-expiration-days: 7
  onboarding:
    provisioning:
      executor:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 200
        keep-alive-seconds: 60
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  websocket:
    allowed-origins: http://localhost:3000,http://localhost:5173
  bootstrap:
    platform-admin:
      name: Platform Admin
      email: platform.admin@worknest.local
      password: ChangeMe123!
    seed-demo-data: false
  storage:
    attachments-dir: storage/attachments
    max-file-size-bytes: 10485760
    allowed-mime-types: image/png,image/jpeg,application/pdf,text/plain

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
