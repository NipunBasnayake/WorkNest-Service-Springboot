services:
  db:
    image: mysql:8.4
    container_name: worknest-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: platform_master
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p1234"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worknest-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/platform_master?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 1234
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "false"
      JWT_SECRET: V29ya05lc3RTdXBlclNlY3JldEtleUZvckpXVDEyMzQ1Njc4OTAxMjM0NTY3ODkw
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      WS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      BOOTSTRAP_SEED_DEMO_DATA: "true"
      ATTACHMENTS_DIR: /app/storage/attachments
    ports:
      - "8080:8080"
    volumes:
      - attachments-data:/app/storage

volumes:
  mysql-data:
  attachments-data:
